name: "Sprout Track"
description: "Self-hosted baby activity tracker"
version: "1.0.0"
slug: "sprout_track"
init: false
arch:
  - amd64
  - aarch64
webui: http://[HOST]:[PORT:3333]
panel_icon: mdi:baby-carriage
panel_title: Sprout Track
ports:
  3333/tcp: 3333
ports_description:
  3333/tcp: "Web UI"
map:
  - share:rw
options:
  auth_life: 86400
  idle_time: 604800
  enable_notifications: true
schema:
  auth_life: int
  idle_time: int
  enable_notifications: bool
